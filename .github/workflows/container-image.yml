name: Build images
on:
  push:
    branches:
      - main
  release:
    types:
      - published


jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless signing via GitHub OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Version Metadata
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "REVISION=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> $GITHUB_ENV
          else
            echo "REVISION=${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release
        id: ko_build_release
        if: ${{ github.event_name == 'release' }}
        env:
          KO_DOCKER_REPO: ghcr.io/bakito/kubexporter
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          DIGEST=$(ko build --bare --platform=linux/amd64 --tags=latest,${VERSION} .)
          echo "digest=${DIGEST##*@}" >> $GITHUB_OUTPUT

      - name: Sign release image
        if: ${{ github.event_name == 'release' }}
        run: |
          cosign sign --yes ghcr.io/bakito/kubexporter@${{ steps.ko_build_release.outputs.digest }}

      - name: Build and push main
        id: ko_build_main
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          KO_DOCKER_REPO: ghcr.io/bakito/kubexporter
          VERSION: main
        run: |
          DIGEST=$(ko build --bare --platform=linux/amd64 --tags=main .)
          echo "digest=${DIGEST##*@}" >> $GITHUB_OUTPUT

      - name: Sign main image
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          cosign sign --yes ghcr.io/bakito/kubexporter@${{ steps.ko_build_main.outputs.digest }}
