name: Build images

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless signing via GitHub OIDC
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Metadata
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "REVISION=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> $GITHUB_ENV
          else
            echo "REVISION=${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Build and push ${{ github.event.release.tag_name }}
        id: docker_build_release
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: ${{ github.event.release.tag_name != '' }}
        with:
          push: true
          tags: ghcr.io/bakito/kubexporter:latest,ghcr.io/bakito/kubexporter:${{ github.event.release.tag_name }}
          platforms: linux/amd64
          provenance: false
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            REVISION=${{ env.REVISION }}

      - name: Sign release image
        if: ${{ github.event.release.tag_name != '' }}
        run: |
          cosign sign --yes ghcr.io/bakito/kubexporter@${{ steps.docker_build_release.outputs.digest }}

      - name: Build and push main
        id: docker_build_main
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        if: ${{ github.event.release.tag_name == '' }}
        with:
          push: true
          tags: ghcr.io/bakito/kubexporter:main
          platforms: linux/amd64
          provenance: false
          build-args: |
            VERSION=main
            REVISION=${{ env.REVISION }}

      - name: Sign main image
        if: ${{ github.event.release.tag_name == '' }}
        run: |
          cosign sign --yes ghcr.io/bakito/kubexporter@${{ steps.docker_build_main.outputs.digest }}

      - name: Image digest
        run: echo ${{ steps.docker_build_release.outputs.digest }}${{ steps.docker_build_main.outputs.digest }}
