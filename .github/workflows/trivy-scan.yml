name: Trivy Vulnerability Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:00 UTC to catch new CVEs on existing images
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  trivy-scan:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write # Required to upload SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Get latest release tag
        id: latest_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(gh release view --json tagName --jq '.tagName')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Pull latest release image from GHCR
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.latest_release.outputs.tag }}

      - name: Run Trivy vulnerability scan (table output)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0" # Don't fail the build — just report

      - name: Run Trivy vulnerability scan for latest release image (table output)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.latest_release.outputs.tag }}"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0" # Don't fail the build — just report

      - name: Run Trivy vulnerability scan (SARIF for GitHub Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"

      - name: Run Trivy vulnerability scan for latest release image (SARIF for GitHub Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.latest_release.outputs.tag }}"
          format: "sarif"
          output: "trivy-results-latest-release.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Upload latest release Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always()
        with:
          sarif_file: "trivy-results-latest-release.sarif"
