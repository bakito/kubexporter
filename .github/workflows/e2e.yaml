name: e2e tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-e2e-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🖼 Build image
        run: |
          docker build -f Dockerfile --build-arg VERSION=e2e-tests --build-arg REVISION=e2e-tests -t kubexporter:e2e .
          docker save kubexporter:e2e -o /tmp/image.tar

      - name: 📦 Upload image tar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-tar
          path: /tmp/image.tar
          retention-days: 1
  e2e:
    runs-on: ubuntu-latest
    needs: build-e2e-image
    strategy:
      fail-fast: false
      matrix:
        # https://hub.docker.com/r/kindest/node/tags
        k8s_version: ["v1.34.8", "v1.35.5", "v1.36.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: 📥 Download image tar
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-tar
          path: /tmp

      - name: Install kind with registry
        uses: bakito/kind-with-registry-action@b13dc5fd599a5c774e7ca721d6e7a34f7269d2d8 # v1.0.1
        with:
          node_image: kindest/node:${{ matrix.k8s_version }}
          kubectl_version: ${{ matrix.k8s_version }}
          docker_image_name: kubexporter:e2e
          docker_image_file: /tmp/image.tar

      - name: Set up test namespaces
        run: |
          kubectl apply -f testdata/e2e/namespaces.yaml
          echo "Waiting for test deployments to be created"
          for ns in e2e-ns1 e2e-ns2 e2e-ns3; do
            kubectl rollout status deployment/e2e-deploy -n "$ns" --timeout=60s
          done

      - name: Export all namespaces
        run: |
          echo "## Export all namespaces" >> $GITHUB_STEP_SUMMARY
          go run . --config config.yaml --progress simple --target exports-all >> $GITHUB_STEP_SUMMARY
          testdata/e2e/verify-namespaces.sh exports-all e2e-ns1 e2e-ns2 e2e-ns3

      - name: Export a single namespace
        run: |
          echo "## Export a single namespace" >> $GITHUB_STEP_SUMMARY
          go run . --config config.yaml --progress simple --target exports-single --namespace e2e-ns1 >> $GITHUB_STEP_SUMMARY
          testdata/e2e/verify-namespaces.sh exports-single e2e-ns1

      - name: Export two namespaces
        run: |
          echo "## Export two namespaces" >> $GITHUB_STEP_SUMMARY
          go run . --config config.yaml --progress simple --target exports-two --namespace e2e-ns1 --namespace e2e-ns2 >> $GITHUB_STEP_SUMMARY
          testdata/e2e/verify-namespaces.sh exports-two e2e-ns1 e2e-ns2

      - name: Run Exporter as k8s Job
        id: run_as_k8s_job
        continue-on-error: true
        run: |
          kubectl create ns e2e
          kubectl apply -n e2e -f testdata/e2e/job-with-rbac.yaml
          echo "Waiting for Job to be terminated"
          kubectl wait --for=condition=complete job/kubexporter -n e2e --timeout=30s
      - name: Print k8s logs
        run: |
          echo "## Run Exporter as k8s Job" >> $GITHUB_STEP_SUMMARY
          kubectl logs -n e2e -l e2e=kubexporter --tail=10000 >> $GITHUB_STEP_SUMMARY

      - name: Fail if 'Run Exporter as k8s Job' failed
        if: steps.run_as_k8s_job.outcome=='failure'
        run: |
          echo "Step 'Run Exporter as k8s Job' failed: Check the logs as well as the job summary for errors"
          exit 1
