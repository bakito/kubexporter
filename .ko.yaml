defaultBaseImage: cgr.dev/chainguard/static:latest
builds:
  - id: kubexporter
    main: .
    ldflags:
      - -w -s
      - -X github.com/bakito/kubexporter/version.Version={{.Env.VERSION}}
      - -X github.com/bakito/kubexporter/version.Revision={{.Env.REVISION}}
      - -X github.com/bakito/kubexporter/version.BuildDate={{.Env.BUILD_DATE}}
